name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-test:
    name: cargo test (Rust 单测)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri 在 Linux 上编译需要的系统库
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-stock/src-tauri

      - name: Run tests
        run: cargo test --manifest-path rust-stock/src-tauri/Cargo.toml

  frontend-syntax:
    name: node --check (前端模块语法)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check all ES modules
        run: |
          set -e
          for f in $(find rust-stock/src -name "*.js"); do
            node --input-type=module --check < "$f"
            echo "ok: $f"
          done

      # 防截断守卫：每个 HTML 必须有结束标签和（主页面）script 入口。
      # 此前 index.html 曾被同步问题截断且随提交进了仓库，UI 整体瘫痪却无任何报错。
      - name: Check HTML completeness
        run: |
          set -e
          for f in $(find rust-stock/src -name "*.html"); do
            grep -q '</html>' "$f" || { echo "TRUNCATED: $f (缺 </html>)"; exit 1; }
            grep -q '<script type="module"' "$f" || { echo "NO SCRIPT: $f"; exit 1; }
            echo "ok: $f"
          done
